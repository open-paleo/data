clade: Saurischia
description: >
  Saurischia, meaning "lizard-hipped," is one of the two major clades of
  dinosaurs. Saurischians retain an ancestral pelvic configuration in which the
  pubis points forward and downward, in contrast to the retroverted pubis of
  ornithischians. The clade includes the bipedal, mostly carnivorous theropods
  and the long-necked, herbivorous sauropodomorphs. Saurischia is defined as all
  dinosaurs more closely related to birds than to Triceratops.
described: 1888
authors: Seeley

diagnostic_features:
  - Forward-pointing (anteroventrally directed) pubis in basal members
  - Elongate, mobile neck with cervical vertebrae bearing well-developed pleurocoels
  - Asymmetrical hand with digit II longest
  - Subnarial foramen present between premaxilla and maxilla

