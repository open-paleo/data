clade: Thyreophora
description: >
  Thyreophora, meaning "shield bearers," is a clade of armored ornithischian
  dinosaurs that includes Stegosauria and Ankylosauria. Thyreophorans are
  characterized by the presence of dermal armor in the form of osteoderms
  (bony scutes, plates, or spines) embedded in the skin along the body.
  The clade appeared in the Early Jurassic and persisted until the end of
  the Cretaceous, with a global distribution. Thyreophorans were obligate
  quadrupeds and herbivores.
described: 1915
authors: Nopcsa

diagnostic_features:
  - Parasagittal rows of osteoderms (dermal armor) along the dorsal surface
  - Keeled scutes or plates on the body
  - Quadrupedal stance in all but the most basal forms
  - Robust, low-slung body plan
  - Small head relative to body size with simple, leaf-shaped teeth

