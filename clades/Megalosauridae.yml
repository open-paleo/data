clade: Megalosauridae
description: >
  Megalosauridae is a family of large basal tetanuran theropod dinosaurs known
  primarily from the Middle to Late Jurassic of Europe, Africa, and South
  America. The family includes Megalosaurus bucklandii, the first dinosaur to be
  scientifically described and named (1824). Megalosaurids were robust, large-
  bodied predators with powerful forelimbs and laterally compressed, serrated
  teeth.
described: 1869
authors: Huxley

diagnostic_features:
  - Large body size with robust skeletal construction
  - Laterally compressed, serrated teeth
  - Well-developed and powerful forelimbs with large manual claws
  - Tall neural spines on dorsal vertebrae
  - Distinctive premaxillary-maxillary contact morphology

