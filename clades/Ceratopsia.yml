clade: Ceratopsia
description: >
  Ceratopsia, meaning "horned faces," is a clade of marginocephalian
  ornithischian dinosaurs characterized by a unique rostral bone at the tip of
  the upper jaw and a parietosquamosal frill extending from the back of the
  skull. The clade includes small, bipedal basal forms such as Psittacosaurus
  and large, quadrupedal ceratopsids like Triceratops and Styracosaurus.
  Ceratopsians were exclusively herbivorous and were most diverse in the Late
  Cretaceous of North America and Asia. Horns above the eyes and nose evolved
  in more derived members.
described: 1890
authors: Marsh

diagnostic_features:
  - Rostral bone forming a sharp, beak-like tip of the upper jaw
  - Parietosquamosal frill extending posterodorsally from the skull
  - Jugal flanges (flared cheek horns) on the skull
  - Shearing dentition with double-rooted cheek teeth
  - Nasal and supraorbital horns in derived ceratopsids
  - Predentary bone with a sharp cutting edge

