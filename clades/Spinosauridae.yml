clade: Spinosauridae
description: >
  Spinosauridae is a family of large megalosauroid theropod dinosaurs
  characterized by elongated, crocodile-like snouts and conical, unserrated
  teeth adapted for piscivory (fish-eating). Many spinosaurids possessed
  enlarged dorsal neural spines forming a sail or ridge along the back. The
  family includes Spinosaurus, one of the largest known theropods, which shows
  evidence of semi-aquatic habits. Spinosaurids are known from the Cretaceous of
  Africa, Europe, and South America.
described: 1915
authors: Stromer

diagnostic_features:
  - Elongated, narrow snout with a terminal rosette of premaxillary teeth
  - Conical, unserrated teeth adapted for grasping fish
  - Enlarged, elongate neural spines on dorsal and sacral vertebrae
  - Secondary palate partially developed
  - Enlarged manual ungual on digit I
  - Retracted external nares

