clade: Ceratosauria
description: >
  Ceratosauria is a clade of early-diverging theropod dinosaurs that radiated
  primarily during the Jurassic and Cretaceous periods. Many ceratosaurs
  possessed prominent cranial ornamentation, including horns and crests. The
  group was particularly diverse in Gondwanan landmasses and includes the
  abelisaurids, noasaurids, and the Jurassic ceratosaurids. Ceratosaurs
  generally retained four digits on the hand, unlike the three-fingered
  condition of more derived theropods.
described: 1884
authors: Marsh

diagnostic_features:
  - Cranial ornamentation including horns, bosses, or rugose crests in many taxa
  - Fused pelvic elements (ilium, ischium, pubis) in mature individuals
  - Four functional digits on the manus in basal members
  - Specialized sacral vertebral articulations
  - Distinctive cervical vertebral morphology with low neural spines

