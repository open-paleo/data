clade: Theropoda
description: >
  Theropoda, meaning "beast feet," is a clade of predominantly bipedal
  saurischian dinosaurs. Most theropods were carnivorous, though several
  lineages independently evolved herbivory or omnivory. Theropods are
  characterized by hollow (pneumatic) bones, three-toed weight-bearing
  hindlimbs, and a furcula (wishbone). The clade includes all living birds
  (Aves), making Theropoda one of the most successful vertebrate lineages
  in Earth's history.
described: 1881
authors: Marsh

diagnostic_features:
  - Hollow (pneumatized) long bones
  - Obligate bipedal stance
  - Three weight-bearing digits on the pes (functionally tridactyl foot)
  - Furcula (fused clavicles) present
  - Intramandibular joint in the lower jaw
  - Carnivorous dentition with serrated, laterally compressed teeth in basal members

