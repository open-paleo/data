clade: Troodontidae
description: >
  Troodontidae is a family of small, bird-like maniraptoran theropod dinosaurs
  known from the Cretaceous of North America, Asia, and Europe. Troodontids are
  notable for possessing the largest brain-to-body-size ratio among non-avian
  dinosaurs, suggesting relatively high intelligence. They had large, forward-
  facing eyes indicating good binocular vision, long and slender legs adapted
  for speed, and a retractable sickle claw on the second toe (smaller than in
  dromaeosaurids). Troodontids are among the closest known relatives of Aves.
described: 1924
authors: Gilmore

diagnostic_features:
  - Large brain relative to body size (high encephalization quotient)
  - Large, forward-facing orbits with well-developed binocular vision
  - Closely packed, numerous small teeth with large denticles
  - Retractable sickle claw on pedal digit II (smaller than dromaeosaurid condition)
  - Slender and elongate metatarsus adapted for cursorial locomotion
  - Asymmetric trochlea of metatarsal IV

