clade: Hadrosauriformes
description: >
  Hadrosauriformes is a clade of styracosternan ornithopod dinosaurs that
  includes the hadrosaurs (duck-billed dinosaurs) and their immediate
  relatives such as Iguanodon. Hadrosauriforms are characterized by well-
  developed dental batteries consisting of multiple stacked replacement teeth,
  broad and flattened snouts (often described as duck-billed), and large body
  size. The clade was globally distributed during the Cretaceous period and
  represents one of the most successful ornithischian radiations.
described: 1997
authors: Sereno

diagnostic_features:
  - Well-developed dental battery with multiple replacement teeth in each tooth position
  - Broad, flattened premaxilla forming a duck-like bill
  - Reduced or absent thumb spike compared to basal styracosternans
  - Elongate and dorsoventrally flattened rostrum
  - Three or more replacement teeth per tooth family

