clade: Allosauridae
description: >
  Allosauridae is a family of large carnosaur theropod dinosaurs best known from
  the Late Jurassic of North America and Europe. The family is typified by
  Allosaurus, one of the most abundant and well-studied large predatory
  dinosaurs. Allosaurids were apex predators characterized by large skulls with
  prominent lacrimal horns, powerful forelimbs with three clawed digits, and
  laterally compressed serrated teeth.
described: 1878
authors: Marsh

diagnostic_features:
  - Prominent lacrimal horns or hornlets above the eyes
  - Large skull with paired nasal crests
  - Laterally compressed, recurved, serrated teeth
  - Three-fingered manus with large manual unguals
  - Robust cervical vertebrae with well-developed epipophyses

