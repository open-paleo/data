clade: Tyrannosauridae
description: >
  Tyrannosauridae is a family of large coelurosaurian theropod dinosaurs that
  were apex predators during the Late Cretaceous of North America and Asia. The
  family includes Tyrannosaurus rex, one of the largest and most powerful
  terrestrial predators known. Tyrannosaurids are characterized by their
  proportionally enormous skulls, massive bite force, robust heterodont
  dentition, extremely reduced two-fingered forelimbs, and powerful hindlimbs
  adapted for cursorial locomotion.
described: 1906
authors: Osborn

diagnostic_features:
  - Proportionally enormous skull with robust, deeply rooted teeth
  - D-shaped cross-section of premaxillary teeth (incisiform premaxillary teeth)
  - Extremely reduced forelimbs with only two functional digits
  - Massive adductor musculature indicating powerful bite force
  - Arctometatarsalian foot with pinched third metatarsal
  - Fused nasals along the midline

