clade: Therizinosauridae
description: >
  Therizinosauridae is a family of bizarre, large-bodied maniraptoran theropod
  dinosaurs known from the Cretaceous of Asia and North America. Despite their
  theropod ancestry, therizinosaurs were herbivorous, possessing a suite of
  unusual adaptations including enormously elongated manual claws (up to 1 metre
  in Therizinosaurus), a wide, barrel-shaped torso for housing an enlarged
  herbivorous gut, a small head with a keratinous beak and leaf-shaped teeth,
  and a broad, four-toed foot.
described: 1954
authors: Maleev

diagnostic_features:
  - Enormously elongated manual unguals (claws), especially on digit I
  - Wide, barrel-shaped torso accommodating an enlarged gut
  - Small skull with edentulous premaxilla and leaf-shaped cheek teeth
  - Opisthopubic (posteriorly directed) pelvis
  - Broad, functionally tetradactyl (four-toed) pes
  - Dense, filamentous integumentary covering

