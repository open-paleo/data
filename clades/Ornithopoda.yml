clade: Ornithopoda
description: >
  Ornithopoda, meaning "bird feet," is a clade of cerapodan ornithischian
  dinosaurs that includes the iguanodonts and hadrosaurs along with numerous
  smaller, basal members. Ornithopods were among the most successful and
  widespread herbivorous dinosaurs, ranging from small bipedal forms in the
  Jurassic to large quadrupedal hadrosaurs in the Late Cretaceous. They are
  characterized by their efficient jaw mechanism that allowed transverse
  (pleurokinetic) chewing of plant material, a feature rare among reptiles.
described: 1881
authors: Marsh

diagnostic_features:
  - Pleurokinetic skull allowing lateral movement of the maxillae during chewing
  - Tridactyl (three-toed) pes with hoof-like unguals
  - Absence of premaxillary teeth (keratinous beak present)
  - Well-developed dental battery in advanced forms
  - Tendency toward facultative or obligate quadrupedality in larger taxa
  - Elongate prepubic process of the pubis

