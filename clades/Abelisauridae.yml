clade: Abelisauridae
description: >
  Abelisauridae is a family of ceratosaurian theropod dinosaurs that were
  dominant predators in Gondwanan landmasses during the Cretaceous period.
  Abelisaurids are characterized by short, deep skulls, heavily ornamented
  cranial bones, and dramatically reduced forelimbs that are even more vestigial
  than those of tyrannosaurids. Notable members include Carnotaurus,
  Majungasaurus, and Abelisaurus. The family was most diverse in South America,
  Madagascar, and India.
described: 1985
authors: Bonaparte & Novas

diagnostic_features:
  - Short, deep skull with rugose ornamentation on frontal and nasal bones
  - Extremely reduced forelimbs with vestigial digits
  - Thickened skull roof bones
  - Robust and short cervical vertebrae
  - Well-developed femoral musculature attachment sites indicating powerful hindlimbs

