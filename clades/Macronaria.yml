clade: Macronaria
description: >
  Macronaria, meaning "large nostrils," is a clade of neosauropod dinosaurs
  characterized by large nasal openings (external nares) that are typically
  larger than the orbits. The clade includes brachiosaurids, titanosaurs, and
  their relatives, and was particularly diverse and dominant during the
  Cretaceous period. Macronarians tended to have more robust, box-like skulls
  with spatulate teeth, in contrast to the elongate skulls and peg-like teeth of
  diplodocoids.
described: 1995
authors: Wilson & Sereno

diagnostic_features:
  - Enlarged external nares larger than the orbit
  - Spatulate (spoon-shaped) teeth
  - Box-like, dorsoventrally deep skull
  - Opisthocoelous anterior caudal vertebrae
  - Metacarpals arranged in a tubular, U-shaped colonnade

