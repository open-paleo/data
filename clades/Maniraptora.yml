clade: Maniraptora
description: >
  Maniraptora, meaning "hand snatchers," is a clade of coelurosaurian theropod
  dinosaurs that includes dromaeosaurids, troodontids, oviraptorosaurs,
  therizinosaurs, and birds (Aves). Maniraptorans are characterized by elongated
  arms relative to body size, a semilunate carpal bone enabling a folding
  mechanism in the wrist, and the widespread presence of pennaceous feathers.
  The clade represents the closest relatives of and includes modern birds,
  making it one of the most significant groups in understanding avian origins.
described: 1986
authors: Gauthier

diagnostic_features:
  - Elongated forelimbs relative to body size
  - Semilunate (half-moon shaped) carpal bone allowing wrist folding
  - Pennaceous feathers present in many lineages
  - Elongate and mobile manus
  - Opisthopubic pelvis (posteriorly directed pubis) in many taxa
  - Reduced or absent postorbital bar

references:
