clade: Dinosauria
description: >
  Dinosauria is a clade of archosaurian reptiles that first appeared during the
  Triassic period, approximately 233 million years ago. Dinosaurs are united by
  a suite of anatomical features including a fully upright (parasagittal) stance,
  a fully open (perforated) acetabulum in the pelvis, and three or more sacral
  vertebrae. The clade encompasses two major lineages, Saurischia and
  Ornithischia, and includes all descendants of their most recent common
  ancestor, extending to modern birds (Aves).
described: 1842
authors: Owen

diagnostic_features:
  - Fully erect, parasagittal hindlimb posture
  - Perforated (fully open) acetabulum
  - Three or more sacral vertebrae
  - Elongate deltopectoral crest on the humerus
  - Asymmetrical fourth trochanter on the femur
  - Open hip socket allowing pillar-erect stance

