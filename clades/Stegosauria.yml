clade: Stegosauria
description: >
  Stegosauria is a clade of thyreophoran ornithischian dinosaurs best known for
  their distinctive rows of dorsal plates and spines. Stegosaurs appeared in the
  Middle Jurassic and were most diverse during the Late Jurassic, with the group
  declining through the Cretaceous. They were medium to large quadrupedal
  herbivores with small heads, short necks, and hindlimbs significantly longer
  than forelimbs, giving the body a distinctive arched profile. The tail
  typically bore two pairs of elongate spines (the "thagomizer").
described: 1877
authors: Marsh

diagnostic_features:
  - Parasagittal rows of alternating or paired dorsal plates and/or spines
  - Tail spines (thagomizer) used for defense
  - Hindlimbs substantially longer than forelimbs
  - Small skull with simple, leaf-shaped teeth and weak jaw musculature
  - Low, arched body profile
  - Relatively small brain (low encephalization quotient)

