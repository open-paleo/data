clade: Ceratopsidae
description: >
  Ceratopsidae is a family of large-bodied ceratopsian ornithischian dinosaurs
  known from the Late Cretaceous of western North America (and possibly Asia).
  Ceratopsids are among the most recognizable dinosaurs, characterized by
  elaborate cranial ornamentation including large nasal and supraorbital horns,
  expansive parietosquamosal frills often decorated with epiossifications
  (epoccipitals and epiparietals), and a robust, barrel-shaped body. The family
  is divided into Chasmosaurinae (long-frilled forms like Triceratops) and
  Centrosaurinae (short-frilled forms like Centrosaurus).
described: 1890
authors: Marsh

diagnostic_features:
  - Large parietosquamosal frill with marginal epiossifications (epoccipitals)
  - Prominent nasal horn and/or paired supraorbital horns
  - Very large skull, often exceeding 1.5 metres in length
  - Double-rooted, shearing cheek teeth arranged in dental batteries
  - Obligate quadrupedal stance with robust, graviportal limbs
  - Syncervical (fused anterior cervical vertebrae) supporting the massive skull

