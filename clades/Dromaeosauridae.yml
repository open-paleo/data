clade: Dromaeosauridae
description: >
  Dromaeosauridae is a family of small to medium-sized maniraptoran theropod
  dinosaurs commonly known as "raptors." Dromaeosaurids were agile, feathered
  predators characterized by their signature enlarged, sickle-shaped retractable
  claw on the second toe (pedal digit II), stiffened tails used for balance
  during rapid pursuit, and well-developed pennaceous feathers. The family
  includes well-known genera such as Velociraptor, Deinonychus, and
  Microraptor. Dromaeosaurids are among the closest non-avian relatives of
  birds.
described: 1922
authors: Matthew & Brown

diagnostic_features:
  - Enlarged, hyperextensible, sickle-shaped ungual on pedal digit II
  - Stiffened tail with elongated prezygapophyses and chevrons
  - Pennaceous feathers on forelimbs and hindlimbs
  - Semilunate carpal bone enabling wing-folding motion of manus
  - Laterally compressed, recurved, serrated teeth
  - Reduced and stiffened distal tail functioning as a dynamic stabilizer

