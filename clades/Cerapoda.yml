clade: Cerapoda
description: >
  Cerapoda is a clade of ornithischian dinosaurs that unites Ornithopoda and
  Marginocephalia. Cerapodans are characterized by specialized jaw mechanics
  adapted for efficient oral processing of plant material, including a well-
  developed coronoid process on the dentary, asymmetrical enamel on the teeth
  enabling precise occlusion, and the loss of premaxillary teeth. The clade
  encompasses a wide range of herbivorous dinosaurs from small bipeds to giant
  quadrupedal forms.
described: 1986
authors: Sereno

diagnostic_features:
  - Well-developed coronoid process on the dentary
  - Asymmetrical enamel distribution on teeth facilitating shearing occlusion
  - Reduction or loss of premaxillary teeth
  - Diastema between premaxillary and maxillary tooth rows
  - Specialized jaw mechanics for efficient oral processing of vegetation

