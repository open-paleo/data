clade: Ornithomimosauria
description: >
  Ornithomimosauria, meaning "bird-mimic lizards," is a clade of coelurosaurian
  theropod dinosaurs known from the Cretaceous of North America, Asia, Europe,
  and Africa. Often called "ostrich dinosaurs," ornithomimosaurs were
  characterized by long legs adapted for swift running, elongate necks, small
  skulls with toothless beaks (in derived forms), and large eyes. They were
  likely omnivorous or herbivorous, representing a significant ecological
  departure from the ancestral carnivorous theropod condition.
described: 1972
authors: Russell

diagnostic_features:
  - Toothless, keratinous beak in derived members
  - Elongate cervical vertebrae forming a long, S-curved neck
  - Large orbits with well-developed sclerotic rings
  - Long, gracile hindlimbs adapted for cursorial locomotion
  - Arctometatarsalian foot in derived forms
  - Elongate manus with subequal metacarpals

