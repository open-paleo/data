clade: Carnosauria
description: >
  Carnosauria is a clade of large-bodied predatory theropod dinosaurs within
  Avetheropoda. In modern phylogenetic usage, Carnosauria is largely synonymous
  with Allosauroidea and includes the allosaurids, carcharodontosaurids, and
  their relatives. Carnosaurs were apex predators during the Jurassic and Early
  to mid-Cretaceous periods, with some reaching body sizes comparable to or
  exceeding Tyrannosaurus.
described: 1920
authors: Huene

diagnostic_features:
  - Large body size with proportionally large skull
  - Lacrimal bone with pneumatic recesses and ornamentation
  - Pronounced cnemial crest on the tibia
  - Large, laterally compressed, serrated teeth
  - Robust and well-developed forelimbs with three-fingered hands

