clade: Hadrosauridae
description: >
  Hadrosauridae is a family of large ornithopod dinosaurs commonly known as
  duck-billed dinosaurs. Hadrosaurs were the most diverse and abundant large
  herbivorous dinosaurs of the Late Cretaceous, with a global distribution.
  They are characterized by highly specialized dental batteries consisting of
  hundreds of closely packed teeth forming a continuous grinding surface,
  broad and flat edentulous premaxillary bills, and in the subfamily
  Lambeosaurinae, elaborate hollow cranial crests likely used for vocalization
  and display. Hadrosaurs include the two major subgroups Hadrosaurinae
  (flat-headed forms) and Lambeosaurinae (crested forms).
described: 1869
authors: Cope

diagnostic_features:
  - Highly specialized dental batteries with hundreds of interlocking teeth
  - Broad, spatulate, edentulous premaxillary bill
  - Hollow cranial crests in Lambeosaurinae (extensions of nasal passages)
  - Complete loss of the thumb spike
  - Extensive ossified tendons forming a lattice along the vertebral column
  - Hoof-like unguals on weight-bearing digits

