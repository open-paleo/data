clade: Brachiosauridae
description: >
  Brachiosauridae is a family of macronarian sauropod dinosaurs known from the
  Late Jurassic to Early Cretaceous of North America, Africa, Europe, and
  possibly South America. Brachiosaurids are distinguished by their unusual body
  proportions, with forelimbs longer than or subequal to hindlimbs, giving them
  a distinctive giraffe-like elevated posture. This configuration allowed them
  to browse at greater heights than most other sauropods. Notable members include
  Brachiosaurus and Giraffatitan.
described: 1903
authors: Riggs

diagnostic_features:
  - Forelimbs longer than or subequal in length to hindlimbs
  - Elevated, giraffe-like body posture with the shoulders higher than the hips
  - Elongated humerus exceeding femoral length
  - Highly elevated narial region on the skull
  - Spatulate teeth arranged along the full extent of the jaw margins
  - Relatively short tail compared to other sauropods

