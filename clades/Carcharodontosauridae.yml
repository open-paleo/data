clade: Carcharodontosauridae
description: >
  Carcharodontosauridae, meaning "shark-toothed lizard family," is a family of
  giant carnosaur theropod dinosaurs known from the Cretaceous of Africa, South
  America, Europe, Asia, and North America. The family includes some of the
  largest terrestrial predators ever to have lived, such as Carcharodontosaurus,
  Giganotosaurus, and Mapusaurus. They are named for their distinctive large,
  laterally compressed teeth with prominent serrations resembling those of
  Carcharodon (great white shark).
described: 1931
authors: Stromer

diagnostic_features:
  - Large, laterally compressed teeth with pronounced, shark-like serrations
  - Very large body size, often exceeding 10 metres in length
  - Prominent ornamentation on lacrimal and postorbital bones
  - Pneumatized cranial bones with extensive sinus systems
  - Elongate and narrow maxilla

