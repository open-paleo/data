clade: Coelurosauria
description: >
  Coelurosauria is a large and diverse clade of theropod dinosaurs that includes
  tyrannosaurs, ornithomimosaurs, maniraptorans, and all living birds.
  Coelurosaurs are the most speciose theropod clade and exhibit an extraordinary
  range of body sizes, diets, and ecologies. Many coelurosaurs possessed
  filamentous integumentary structures or true feathers. The clade originated in
  the Middle Jurassic and includes the only dinosaur lineage to survive the
  end-Cretaceous extinction.
described: 1914
authors: Huene

diagnostic_features:
  - Elongate distal caudal vertebrae with reduced or absent transverse processes
  - Filamentous integument or feathers present in many lineages
  - Reduced or absent prefrontal bone
  - Semilunate carpal bone in wrist of many derived taxa
  - Tibiotarsus longer than femur
  - Enlarged cerebrum relative to body size

references:
