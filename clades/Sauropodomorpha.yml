clade: Sauropodomorpha
description: >
  Sauropodomorpha is a major clade of saurischian dinosaurs comprising the
  long-necked herbivorous dinosaurs and their ancestors. The clade ranges from
  small, facultatively bipedal early forms of the Late Triassic to the giant
  quadrupedal sauropods that dominated terrestrial herbivore niches throughout
  the Jurassic and Cretaceous. Sauropodomorphs include the largest land animals
  ever to have lived and are characterized by their elongated necks, small heads
  relative to body size, and herbivorous or omnivorous diets.
described: 1932
authors: Huene

diagnostic_features:
  - Elongated neck with ten or more cervical vertebrae
  - Small skull relative to body size
  - Leaf-shaped or spatulate teeth adapted for herbivory
  - Enlarged nares
  - Large pollex (thumb) claw on manus digit I
  - Trend toward increasing body size through evolutionary history

