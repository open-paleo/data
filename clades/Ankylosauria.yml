clade: Ankylosauria
description: >
  Ankylosauria is a clade of heavily armored thyreophoran ornithischian dinosaurs
  known from the Middle Jurassic to the end of the Cretaceous. Ankylosaurs were
  low-slung, quadrupedal herbivores encased in extensive dermal armor consisting
  of osteoderms arranged in transverse rows across the body, often supplemented
  by lateral spines. Some ankylosaurs, particularly ankylosaurids, possessed a
  massive bony tail club used for defense. The clade includes Ankylosauridae and
  Nodosauridae.
described: 1923
authors: Osborn

diagnostic_features:
  - Extensive dermal armor covering the dorsal surface and flanks
  - Low, wide body plan with short, robust limbs
  - Fused osteoderms on the skull forming a solid cranial shield
  - Tail club present in Ankylosauridae (modified distal caudal vertebrae and osteoderms)
  - Laterally projecting cervical or shoulder spines in many taxa
  - Secondary palate present

