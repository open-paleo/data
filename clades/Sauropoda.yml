clade: Sauropoda
description: >
  Sauropoda is a clade of large to gigantic sauropodomorph dinosaurs that
  includes the largest terrestrial animals in Earth's history. Sauropods were
  obligate quadrupeds with columnar limbs, extremely elongated necks containing
  12 or more cervical vertebrae, long tails, and relatively small skulls.
  Extensive skeletal pneumaticity (air-filled bones) reduced body mass and may
  have aided respiration. Sauropods were globally distributed throughout the
  Jurassic and Cretaceous periods and occupied large-bodied herbivore niches on
  every continent.
described: 1878
authors: Marsh

diagnostic_features:
  - Gigantic body size with columnar, graviportal limbs
  - Extremely elongated neck with 12 or more opisthocoelous cervical vertebrae
  - Extensive postcranial skeletal pneumaticity
  - Spatulate or peg-like teeth
  - Obligate quadrupedal posture
  - Reduced or absent manual phalanges on lateral digits

