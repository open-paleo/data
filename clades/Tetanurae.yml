clade: Tetanurae
description: >
  Tetanurae, meaning "stiff tails," is a large clade of theropod dinosaurs
  characterized by stiffened tails with interlocking zygapophyses in the distal
  caudal vertebrae, and the reduction of the hand to three functional digits.
  Tetanurans include the megalosauroids, allosaurs, and coelurosaurs (including
  birds). The clade represents the majority of theropod diversity from the
  Middle Jurassic onward.
described: 1986
authors: Gauthier

diagnostic_features:
  - Stiffened distal tail with interlocking zygapophyses
  - Reduction of the hand to three functional digits (loss of digit IV)
  - Maxillary tooth row restricted to anterior portion of skull, not extending posterior to antorbital fenestra
  - Large, well-developed maxillary fenestra
  - Tibia longer than or equal to femur

references:
