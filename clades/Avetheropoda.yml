clade: Avetheropoda
description: >
  Avetheropoda is a clade of advanced theropod dinosaurs that unites Carnosauria
  and Coelurosauria. Avetheropods represent the more derived tetanurans,
  distinguished from megalosauroids by features of the skull, vertebral column,
  and limbs. The clade encompasses the majority of Late Jurassic and Cretaceous
  theropod diversity, including all living birds.
described: 1986
authors: Paul

diagnostic_features:
  - Maxillary fenestra present and well-developed
  - Reduced or absent prefrontal bone
  - Enlarged orbit relative to skull length
  - Fused interdental plates
  - Opisthopubic or mesopubic pelvis in derived members

