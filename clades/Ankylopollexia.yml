clade: Ankylopollexia
description: >
  Ankylopollexia, meaning "fused thumb," is a clade of ornithopod dinosaurs
  characterized by a robust, conical thumb spike formed by a modified and
  enlarged pollex (first manual digit). This distinctive feature likely served as
  a defensive weapon or for intraspecific combat. Ankylopollexians range from
  medium-sized bipedal forms such as Camptosaurus to the large iguanodonts and
  hadrosaurs. The clade represents one of the most diverse and successful
  ornithischian radiations.
described: 1986
authors: Sereno

diagnostic_features:
  - Conical, spike-like thumb (pollex) formed by a fused and enlarged first manual ungual
  - Robust metacarpal I fused to or tightly articulating with the carpus
  - Progressive reduction of manual digit V
  - Elongate and robust prepubic process
  - Trend toward increasingly complex dental batteries in derived members

