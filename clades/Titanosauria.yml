clade: Titanosauria
description: >
  Titanosauria is a diverse and species-rich clade of macronarian sauropod
  dinosaurs that dominated herbivore niches across Gondwana and Laurasia during
  the Cretaceous period. Titanosaurs include both the largest known dinosaurs
  (Argentinosaurus, Patagotitan) and some of the smallest sauropods
  (Magyarosaurus). Many titanosaurs possessed osteoderms (bony armor plates)
  embedded in the skin, a feature unique among sauropods. The clade was the last
  major sauropod radiation before the end-Cretaceous extinction.
described: 1877
authors: Lydekker

diagnostic_features:
  - Procoelous caudal vertebrae (concave anteriorly, convex posteriorly)
  - Osteoderms (bony dermal armor) present in many taxa
  - Wide-gauge (laterally splayed) limb posture
  - Loss of manual phalanges in derived forms
  - Strongly opisthocoelous dorsal and caudal vertebrae
  - Expanded iliac blade with a preacetabular process directed laterally

