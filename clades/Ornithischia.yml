clade: Ornithischia
description: >
  Ornithischia, meaning "bird-hipped," is one of the two traditionally
  recognized major clades of dinosaurs. Ornithischians are united by a
  distinctive pelvic anatomy in which the pubis is rotated posteriorly to lie
  parallel with the ischium, convergently resembling the pelvic arrangement of
  birds (though birds are actually saurischians). The clade includes the armored
  thyreophorans (stegosaurs and ankylosaurs), the horned ceratopsians, the
  dome-headed pachycephalosaurs, and the duck-billed ornithopods. All
  ornithischians were herbivorous.
described: 1888
authors: Seeley

diagnostic_features:
  - Opisthopubic pelvis with posteriorly directed pubis parallel to ischium
  - Predentary bone at the tip of the lower jaw
  - Ossified tendons along the vertebral column in many taxa
  - Leaf-shaped cheek teeth with denticulate margins
  - Palpebral bone in the orbit
  - Herbivorous diet across all members

