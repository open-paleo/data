clade: Styracosterna
description: >
  Styracosterna, meaning "spiked stern," is a clade of ankylopollexian
  ornithopod dinosaurs characterized by a spike-like first manual ungual
  (thumb spike) that is more developed and conical than in basal
  ankylopollexians. The clade includes Iguanodon and more derived ornithopods
  leading to Hadrosauriformes. Styracosternans became the dominant large-bodied
  herbivores in many Early to Late Cretaceous ecosystems worldwide.
described: 1986
authors: Sereno

diagnostic_features:
  - Well-developed, spike-like conical pollex ungual
  - Loss of manual digit V phalanges in many members
  - Elongate snout with expanded and edentulous premaxilla
  - Hoof-like unguals on pedal digits
  - Maxillary tooth rows set medially with a fleshy cheek inferred

