clade: Diplodocidae
description: >
  Diplodocidae is a family of diplodocoid sauropod dinosaurs known primarily from
  the Late Jurassic of North America, with additional occurrences in Africa and
  Europe. Diplodocids are characterized by their extremely elongated bodies with
  long, whip-like tails, elongate and shallow skulls with anteriorly restricted
  pencil-shaped teeth, and bifurcated (forked) neural spines on cervical and
  dorsal vertebrae. Notable members include Diplodocus, Apatosaurus, and
  Brontosaurus.
described: 1884
authors: Marsh

diagnostic_features:
  - Extremely elongated tail with whip-like distal section
  - Pencil-shaped (cylindrical) teeth restricted to the front of the jaws
  - Bifurcated (forked) neural spines on cervical and anterior dorsal vertebrae
  - Anteroposteriorly elongated skull with squared-off snout
  - Elongated cervical vertebrae with low neural arches
  - Tail chevrons with anterior and posterior projections (double-beamed)

