clade: Megalosauroidea
description: >
  Megalosauroidea is a superfamily of large-bodied basal tetanuran theropods
  that includes Megalosauridae and Spinosauridae. These predators were prominent
  during the Middle Jurassic through Late Cretaceous. Megalosauroids were among
  the first dinosaurs to be scientifically described and include some of the most
  specialized predatory forms, such as the semi-aquatic spinosaurids.
described: 2002
authors: Holtz, Molnar & Currie

diagnostic_features:
  - Large body size in most members
  - Elongate premaxilla-maxilla contact
  - Robust skull construction with well-developed antorbital fenestra
  - Elongate and robust manual unguals
  - Basal tetanuran grade of skeletal organization

references:
  - id: HoltzEtAl2004
    authors: Holtz, T.R., Molnar, R.E. & Currie, P.J.
    year: 2004
    title: "Basal Tetanurae"
    journal: "The Dinosauria (2nd edition)"
    volume: ""
    pages: "71-110"
