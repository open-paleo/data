clade: Marginocephalia
description: >
  Marginocephalia, meaning "fringed heads," is a clade of cerapodan
  ornithischian dinosaurs united by the presence of a distinctive bony shelf or
  frill projecting from the posterior margin of the skull. The clade includes
  Pachycephalosauria (dome-headed dinosaurs) and Ceratopsia (horned dinosaurs).
  Marginocephalians were exclusively herbivorous and ranged from small bipedal
  forms to massive quadrupedal ceratopsids. The group was most diverse in the
  Late Cretaceous of North America and Asia.
described: 1986
authors: Sereno

diagnostic_features:
  - Parietosquamosal shelf or frill projecting from the posterior margin of the skull
  - Rostral bone at the tip of the upper jaw (in ceratopsians) or thickened skull roof (in pachycephalosaurs)
  - Short postorbital region of the skull
  - Reduction of the supratemporal fenestra
  - Herbivorous dentition with leaf-shaped or shearing teeth

