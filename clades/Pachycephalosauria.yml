clade: Pachycephalosauria
description: >
  Pachycephalosauria, meaning "thick-headed lizards," is a clade of
  marginocephalian ornithischian dinosaurs characterized by a dramatically
  thickened skull roof (frontoparietal dome). These bipedal herbivores or
  omnivores were most diverse during the Late Cretaceous of North America and
  Asia. The thickened dome has been hypothesized to have served in intraspecific
  head-butting or flank-butting contests, though this remains debated. Notable
  genera include Pachycephalosaurus, Stegoceras, and Dracorex.
described: 1974
authors: Maryanska & Osmolska

diagnostic_features:
  - Dramatically thickened frontoparietal dome on the skull roof
  - Peripheral ornamentation of nodes and horns around the dome margin
  - Wide, shelf-like squamosal
  - Relatively large orbits
  - Bipedal stance with stiffened tail
  - Broad body with flared iliac blades

