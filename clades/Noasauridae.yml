clade: Noasauridae
description: >
  Noasauridae is a family of small to medium-sized ceratosaurian theropod
  dinosaurs known primarily from Gondwanan continents during the Cretaceous
  period. Noasaurids were lightly built, gracile predators or omnivores, and
  represent the smaller-bodied counterpart to their sister group Abelisauridae
  within Abelisauria. Notable members include Noasaurus, Masiakasaurus, and
  Elaphrosaurus.
described: 1980
authors: Bonaparte & Powell

diagnostic_features:
  - Small to medium body size with gracile build
  - Lightly constructed skull
  - Elongate cervical vertebrae relative to abelisaurids
  - Procumbent (forward-projecting) teeth in some taxa
  - Relatively long and slender hindlimbs

references:
  - id: BonapartePowell1980
    authors: Bonaparte, J.F. & Powell, J.E.
    year: 1980
    title: "A continental assemblage of tetrapods from the Upper Cretaceous beds of El Brete, northwestern Argentina (Sauropoda-Coelurosauria-Carnosauria-Aves)"
    journal: "Memoires de la Societe Geologique de France"
    volume: "139"
    pages: "19-28"
