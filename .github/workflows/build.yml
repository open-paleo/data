name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate dictionary
        run: npm run generate-dictionary

      - name: Build outputs
        run: npm run build

      - name: Commit build outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ dictionaries/ docs/schema.json docs/open-paleo.json
          if [ -n "$(git status --porcelain dist/ dictionaries/ docs/)" ]; then
            git commit -m "build: update output files"
            git push
          fi
