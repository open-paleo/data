name: Process Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.issue.labels.*.name, 'Add Genus') ||
      contains(github.event.issue.labels.*.name, 'Taxonomy') ||
      contains(github.event.issue.labels.*.name, 'Update Genus') ||
      contains(github.event.issue.labels.*.name, 'Add Species') ||
      contains(github.event.issue.labels.*.name, 'Update Species')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Parse and process issue
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/process-issue.cjs');
            await script({github, context});

      - name: Label issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['needs-info']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '❌ There was an error processing this issue. A maintainer will take a look.'
            });
