name: Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate data
        run: npm run validate

      - name: Sync issue form dropdowns
        run: |
          npm run sync-forms
          if [ -n "$(git status --porcelain .github/ISSUE_TEMPLATE/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/ISSUE_TEMPLATE/
            git commit -m "chore: sync issue form dropdowns"
            git push
          fi

      - name: Spell check
        run: npx cspell "genera/**/*.yml" "clades/**/*.yml" --no-progress
