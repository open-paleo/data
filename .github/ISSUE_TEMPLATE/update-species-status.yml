name: Update Species Status
description: Change the status of an existing species
title: "Update status: "
labels: ["update-species-status"]
body:
  - type: input
    id: genus-name
    attributes:
      label: Genus name
      placeholder: e.g., Tyrannosaurus
    validations:
      required: true

  - type: input
    id: species-name
    attributes:
      label: Species name
      placeholder: e.g., Tyrannosaurus imperator
    validations:
      required: true

  - type: dropdown
    id: new-status
    attributes:
      label: New status
      options:  # sync:schema.yml:status
        - disputed
        - nomen dubium
        - nomen nudum
        - synonym
        - valid
    validations:
      required: true

  - type: input
    id: synonym-of
    attributes:
      label: If synonym, synonym of
      description: Full species name this is a synonym of
      placeholder: e.g., Tyrannosaurus rex

  - type: textarea
    id: reference
    attributes:
      label: Reference / source
      description: Published scientific literature supporting this change
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any additional context or explanation
