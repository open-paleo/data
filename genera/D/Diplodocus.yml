genus: Diplodocus
parent: Diplodocidae
etymology: "double beam"
description: >
  A genus of diplodocid sauropod dinosaur from the Late Jurassic of
  western North America. Diplodocus is among the most easily identifiable
  dinosaurs, with its classic sauropod shape of a long neck and tail,
  with four sturdy legs. It was one of the longer dinosaurs, with some
  species reaching over 25 metres in length.
diet: herbivore
locomotion: quadrupedal
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Extremely long, whip-like tail"
    - "Long neck with a relatively small, elongated skull"
    - "Peg-like teeth restricted to the front of the jaws"

diagnostic_features:
  - Peg-like teeth restricted to anterior portion of jaws
  - Extremely elongated caudal vertebrae with double-beam chevrons
  - Anteriorly positioned nares

identifiers:
