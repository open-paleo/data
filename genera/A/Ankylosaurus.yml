genus: Ankylosaurus
parent: Ankylosauria
etymology: "fused lizard"
description: >
  A genus of ankylosaurid dinosaur from the Late Cretaceous of western
  North America. Ankylosaurus was the largest known ankylosaurid, covered
  in massive bony armor plates (osteoderms) and possessing a large
  club at the end of its tail. It was among the last non-avian
  dinosaurs, living alongside Tyrannosaurus and Triceratops.
diet: herbivore
locomotion: quadrupedal
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: armored
  evidence: direct
  features:
    - "Body covered in large, bony osteoderms"
    - "Massive tail club formed from fused osteoderms"
    - "Low, wide skull with triangular horns"

diagnostic_features:
  - Large tail club formed by fused caudal osteoderms
  - Triangular horns projecting from rear of skull
  - Extensive dorsal armor of keeled osteoderms

