genus: Iguanodon
parent: Styracosterna
etymology: "iguana tooth"
description: >
  A genus of ornithopod dinosaur from the Early Cretaceous of Europe.
  Iguanodon was one of the first dinosaurs ever scientifically described
  and is one of the founding members of the group Dinosauria. It is
  notable for its large thumb spike, which was originally mistakenly
  placed on its nose in early reconstructions.
diet: herbivore
locomotion: facultative
paleoenvironment:
  - fluvial
  - coastal

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Large conical thumb spike"
    - "Robust build with ability to walk bipedally or quadrupedally"
    - "Broad, blunt snout with a horny beak"

diagnostic_features:
  - Large conical thumb spike (manual digit I ungual)
  - Laterally compressed, leaf-shaped teeth with denticulate margins
  - Robust fifth finger that could oppose the others

