genus: Triceratops
parent: Ceratopsidae
etymology: "three-horned face"
description: >
  A genus of chasmosaurine ceratopsian dinosaur from the Late Cretaceous
  of North America. One of the last and largest ceratopsians, Triceratops
  is distinguished by its large bony frill and three facial horns. It is
  one of the most recognizable of all dinosaurs and among the most
  commonly found in the fossil record.
diet: herbivore
locomotion: quadrupedal
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Large bony frill extending from the back of the skull"
    - "Two long brow horns above the eyes"
    - "Short nasal horn on the snout"

diagnostic_features:
  - Three facial horns with elongate brow horns
  - Solid parietal frill lacking fenestrae
  - Elongate squamosal bones forming frill margin

