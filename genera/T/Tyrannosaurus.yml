genus: Tyrannosaurus
parent: Tyrannosauridae
etymology: "tyrant lizard"
description: >
  A genus of large theropod dinosaur that lived in western North America
  during the Late Cretaceous. One of the largest known land predators,
  measuring up to 12.3 metres in length and weighing up to 8.4 tonnes.
  Tyrannosaurus possessed a massive skull with powerful jaw muscles capable
  of generating enormous bite force.
diet: carnivore
locomotion: bipedal
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Massive skull with robust jaw musculature"
    - "Tiny, two-fingered forelimbs"

diagnostic_features:
  - Premaxillary teeth D-shaped in cross-section
  - Fused nasals
  - Reduced forelimb with two functional digits

