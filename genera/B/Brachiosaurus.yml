genus: Brachiosaurus
parent: Brachiosauridae
etymology: "arm lizard"
description: >
  A genus of sauropod dinosaur from the Late Jurassic of North America.
  Brachiosaurus is unusual among sauropods for its proportionally long
  forelimbs, giving it a giraffe-like posture with the body sloping
  upward toward the head. It was one of the tallest and largest
  dinosaurs known from relatively complete remains.
diet: herbivore
locomotion: quadrupedal
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Long forelimbs giving a distinctive upward-sloping body profile"
    - "Tall, arched nasal crest on the skull"
    - "Extremely long neck held at a steep angle"

diagnostic_features:
  - Forelimbs longer than hindlimbs
  - Elongate metacarpals
  - Arched nasal bones forming a crest above the skull

