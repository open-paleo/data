genus: Stegosaurus
parent: Stegosauria
etymology: "roofed lizard"
description: >
  A genus of armored dinosaur from the Late Jurassic of North America
  and Europe. Stegosaurus is immediately recognizable by the distinctive
  double row of kite-shaped plates along its back and the two pairs of
  long spikes on its tail, known as the thagomizer.
diet: herbivore
locomotion: quadrupedal
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Double row of large, kite-shaped dorsal plates"
    - "Two pairs of tail spikes (thagomizer)"
    - "Small, narrow head relative to body size"

diagnostic_features:
  - Alternating dorsal plates arranged in two rows
  - Four tail spikes (thagomizer)
  - Extremely small braincase relative to body size

identifiers:
