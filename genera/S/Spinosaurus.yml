genus: Spinosaurus
parent: Spinosauridae
etymology: "spine lizard"
description: >
  A genus of spinosaurid dinosaur from the Late Cretaceous of North
  Africa. Spinosaurus may have been the largest of all known carnivorous
  dinosaurs, even larger than Tyrannosaurus. It is distinguished by
  the tall neural spines on its vertebrae, which formed a prominent
  sail or hump along its back. Recent discoveries suggest it was
  semi-aquatic, adapted for hunting fish.
diet: piscivore
locomotion: bipedal
paleoenvironment:
  - fluvial
  - coastal

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Tall neural spine sail along the back"
    - "Elongated, crocodile-like snout"
    - "Conical teeth adapted for catching fish"
    - "Paddle-like tail for swimming"

diagnostic_features:
  - Extremely elongated neural spines forming a dorsal sail
  - Elongated rostrum with conical, unserrated teeth
  - Retracted nares positioned far back on the skull

