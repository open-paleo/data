genus: Parasaurolophus
parent: Hadrosauridae
etymology: "near crested lizard"
description: >
  A genus of hadrosaurid dinosaur from the Late Cretaceous of North
  America. Parasaurolophus is best known for its large, elaborate
  cranial crest that extends back from the skull in a long, curved
  tube. The hollow crest likely functioned as a resonating chamber
  for producing sounds and for visual display.
diet: herbivore
locomotion: facultative
paleoenvironment:
  - fluvial
  - forested

appearance:
  integument: scaled
  evidence: inferred
  features:
    - "Long, curved tubular cranial crest extending behind the skull"
    - "Broad, duck-like bill"
    - "Deep tail for possible display"

diagnostic_features:
  - Long, posteriorly directed tubular cranial crest
  - Crest contains convoluted nasal passages
  - Elongate, backward-curving premaxillary-nasal crest

