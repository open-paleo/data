genus: Velociraptor
parent: Dromaeosauridae
etymology: "swift thief"
description: >
  A genus of small dromaeosaurid dinosaur from the Late Cretaceous of
  Mongolia. Despite its popular depiction as a large predator, Velociraptor
  was roughly the size of a turkey, about 2 metres long and 15 kilograms.
  It possessed a large, sickle-shaped claw on the second toe of each
  foot, characteristic of dromaeosaurids.
diet: carnivore
locomotion: bipedal
paleoenvironment:
  - arid

appearance:
  integument: feathered
  evidence: inferred
  features:
    - "Large, sickle-shaped retractable claw on second toe"
    - "Long, stiffened tail for balance"
    - "Elongated snout with serrated teeth"

diagnostic_features:
  - Depressed and elongated skull with upturned snout
  - Enlarged sickle claw on pedal digit II
  - Long, low skull with over 26 teeth in each maxilla

